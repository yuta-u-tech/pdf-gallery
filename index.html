<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Gallery</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Header ── -->
  <header>
    <div class="header-inner">
      <h1 id="site-title">PDF Gallery</h1>
      <p id="site-subtitle">資料一覧</p>
    </div>

    <!-- Great Wave silhouette -->
    <svg class="wave-svg" viewBox="0 0 1440 120" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
      <!-- back wave -->
      <path d="M0,90
        C80,55 120,95 200,72
        C280,48 320,88 400,70
        C480,52 520,85 600,65
        C680,45 720,80 800,60
        C880,40 920,78 1000,58
        C1080,38 1120,75 1200,55
        C1280,35 1360,70 1440,50
        L1440,120 L0,120 Z"
        fill="#0a2748" opacity="0.6"/>
      <!-- mid wave (Great Wave crest) -->
      <path d="M0,100
        C60,68 90,108 160,82
        C200,68 210,50 240,42
        C255,38 264,44 270,52
        C278,62 274,78 280,86
        C300,100 340,92 380,88
        C440,80 500,100 560,90
        C620,80 680,100 740,90
        C800,80 860,100 920,90
        C980,80 1040,100 1100,90
        C1160,80 1220,100 1280,90
        C1340,80 1400,96 1440,92
        L1440,120 L0,120 Z"
        fill="#0d3d6e" opacity="0.85"/>
      <!-- foam flicks on crest -->
      <path d="M220,50 C226,36 238,32 248,38 C256,43 252,54 244,58"
        fill="none" stroke="#d9ecf7" stroke-width="2" stroke-linecap="round"/>
      <path d="M232,46 C240,30 256,26 268,34"
        fill="none" stroke="#d9ecf7" stroke-width="1.5" stroke-linecap="round"/>
      <!-- front wave -->
      <path d="M0,110
        C120,96 200,116 300,106
        C400,96 500,116 600,106
        C700,96 800,116 900,106
        C1000,96 1100,116 1200,106
        C1300,96 1380,112 1440,108
        L1440,120 L0,120 Z"
        fill="#f4efe3"/>
    </svg>
  </header>

  <!-- ── Config Bar ── -->
  <div class="config-bar">
    <input id="repo-input"  type="text" placeholder="owner/repository" autocomplete="off" spellcheck="false">
    <input id="path-input"  type="text" placeholder="フォルダパス（任意）" autocomplete="off" spellcheck="false">
    <button class="btn-load" onclick="loadPDFs()">読み込む</button>
  </div>

  <!-- ── PDF Grid ── -->
  <main>
    <div id="loading" class="loading hidden">読み込み中</div>
    <div id="error"   class="error   hidden"></div>
    <div id="pdf-grid" class="pdf-grid"></div>
  </main>

  <!-- ── Footer Wave ── -->
  <svg class="wave-footer-svg" viewBox="0 0 1440 60" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
    <path d="M0,30 C240,58 480,10 720,30 C960,50 1200,8 1440,30 L1440,0 L0,0 Z"
      fill="#f4efe3"/>
  </svg>
  <footer>
    <p>Powered by GitHub API &nbsp;·&nbsp; Inspired by 葛飾北斎</p>
  </footer>

  <!-- ── PDF Modal ── -->
  <div id="modal" class="modal hidden" onclick="handleModalClick(event)">
    <div class="modal-box">
      <div class="modal-header">
        <h3 id="modal-title"></h3>
        <button class="btn-close" onclick="closeModal()" aria-label="閉じる">×</button>
      </div>
      <iframe id="pdf-viewer" title="PDF Viewer"></iframe>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
