<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Gallery</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Header: 青海波 (seigaiha) pattern background ── -->
  <header>
    <div class="header-inner">
      <h1 id="site-title">PDF Gallery</h1>
      <div class="header-rule"></div>
      <p id="site-subtitle">資料一覧</p>
    </div>
    <!-- 波形の遷移 (header→washi) -->
    <svg class="header-wave" viewBox="0 0 1440 88"
         preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0,18 C240,62 480,4 720,30 C960,56 1200,4 1440,26
               L1440,88 L0,88 Z" fill="#0D3060"/>
      <path d="M0,40 C180,70 360,20 540,46 C720,72 900,24 1080,50
               C1260,72 1380,48 1440,50 L1440,88 L0,88 Z"
            fill="#1050A0" opacity="0.72"/>
      <path d="M0,66 C300,54 600,78 900,64 C1100,55 1300,70 1440,65
               L1440,88 L0,88 Z" fill="#F2EBD9"/>
    </svg>
  </header>

  <!-- ── Config Bar ── -->
  <div class="config-bar">
    <input id="repo-input" type="text" placeholder="owner/repository"
           autocomplete="off" spellcheck="false">
    <input id="path-input" type="text" placeholder="フォルダパス（任意）"
           autocomplete="off" spellcheck="false">
    <button class="btn-load" onclick="loadPDFs()">読み込む</button>
  </div>

  <!-- ── PDF Grid ── -->
  <main>
    <div id="loading" class="loading hidden">読み込み中</div>
    <div id="error"   class="error   hidden"></div>
    <div id="pdf-grid" class="pdf-grid"></div>
  </main>

  <!-- ── Footer ── -->
  <footer>
    <p>PDF Gallery &nbsp;·&nbsp; Powered by GitHub API</p>
  </footer>

  <!-- ── PDF Modal ── -->
  <div id="modal" class="modal hidden" onclick="handleModalClick(event)">
    <div class="modal-box">
      <div class="modal-header">
        <h3 id="modal-title"></h3>
        <button class="btn-close" onclick="closeModal()" aria-label="閉じる">×</button>
      </div>
      <iframe id="pdf-viewer" title="PDF Viewer"></iframe>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
