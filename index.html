<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=ukiyoe-20260705">
</head>
<body>

  <!-- ── Header: 版画風 — 天ぼかし・朱の題簽・冨士・青海波 ── -->
  <header>
    <svg class="fuji-scene" viewBox="0 0 760 330" aria-hidden="true"
         xmlns="http://www.w3.org/2000/svg">
      <circle class="sun-disc" cx="146" cy="88" r="50" fill="#C94040"/>
      <path d="M20 322 C210 300 330 214 352 58 L408 58 C432 214 552 300 742 322 Z"
            fill="#17497E" stroke="#0D3060" stroke-width="5" stroke-linejoin="round"/>
      <path d="M408 58 C432 214 552 300 742 322 L628 322 C528 266 456 184 430 90 Z"
            fill="#0D3060" opacity="0.24"/>
      <path d="M352 58 L408 58 C414 96 421 126 431 152 L404 130 L377 154 L350 130 L324 152 C334 124 344 94 352 58 Z"
            fill="#F4EDDC" stroke="#0D3060" stroke-width="5" stroke-linejoin="round"/>
    </svg>

    <div class="header-inner">
      <div class="cartouche"><span id="site-subtitle">資料一覧</span></div>
      <div class="title-block">
        <h1 id="site-title">PDF Gallery</h1>
        <div class="header-rule" aria-hidden="true"></div>
        <p class="header-caption">GitHub Pages 資料庫</p>
      </div>
    </div>

    <svg class="sea" viewBox="0 0 1440 130" preserveAspectRatio="xMidYMax slice"
         aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <g id="sg-scale">
          <circle r="34" fill="#0D3060"/>
          <circle r="34" fill="none" stroke="#5E8FBC" stroke-width="3.5"/>
          <circle r="25" fill="none" stroke="#5E8FBC" stroke-width="3.5"/>
          <circle r="16" fill="none" stroke="#5E8FBC" stroke-width="3.5"/>
          <circle r="7"  fill="none" stroke="#5E8FBC" stroke-width="3.5"/>
        </g>
        <g id="sg-row">
          <use href="#sg-scale" x="-62"/><use href="#sg-scale" x="0"/>
          <use href="#sg-scale" x="62"/><use href="#sg-scale" x="124"/>
          <use href="#sg-scale" x="186"/><use href="#sg-scale" x="248"/>
          <use href="#sg-scale" x="310"/><use href="#sg-scale" x="372"/>
          <use href="#sg-scale" x="434"/><use href="#sg-scale" x="496"/>
          <use href="#sg-scale" x="558"/><use href="#sg-scale" x="620"/>
          <use href="#sg-scale" x="682"/><use href="#sg-scale" x="744"/>
          <use href="#sg-scale" x="806"/><use href="#sg-scale" x="868"/>
          <use href="#sg-scale" x="930"/><use href="#sg-scale" x="992"/>
          <use href="#sg-scale" x="1054"/><use href="#sg-scale" x="1116"/>
          <use href="#sg-scale" x="1178"/><use href="#sg-scale" x="1240"/>
          <use href="#sg-scale" x="1302"/><use href="#sg-scale" x="1364"/>
          <use href="#sg-scale" x="1426"/><use href="#sg-scale" x="1488"/>
        </g>
      </defs>
      <rect width="1440" height="130" fill="#0D3060"/>
      <use href="#sg-row" y="-8"/>
      <use href="#sg-row" x="31" y="14"/>
      <use href="#sg-row" y="36"/>
      <use href="#sg-row" x="31" y="58"/>
      <use href="#sg-row" y="80"/>
      <use href="#sg-row" x="31" y="102"/>
      <use href="#sg-row" y="124"/>
    </svg>
  </header>

  <!-- ── PDF Grid ── -->
  <main>
    <div class="section-head">
      <h2>所蔵一覧</h2>
      <span id="item-count" class="item-count"></span>
    </div>
    <nav id="breadcrumb" class="breadcrumb" style="display:none"></nav>
    <div id="loading" class="loading hidden">読み込み中</div>
    <div id="error"   class="error   hidden"></div>
    <div id="pdf-grid" class="pdf-grid"></div>

    <!-- ── Config (折りたたみ) ── -->
    <details class="config-panel">
      <summary>リポジトリ設定</summary>
      <div class="config-bar">
        <input id="repo-input" type="text" placeholder="owner/repository"
               autocomplete="off" spellcheck="false">
        <input id="path-input" type="text" placeholder="フォルダパス（任意）"
               autocomplete="off" spellcheck="false">
        <button class="btn-load" onclick="loadPDFs()">読み込む</button>
      </div>
    </details>
  </main>

  <!-- ── Footer ── -->
  <footer>
    <p>PDF Gallery &nbsp;·&nbsp; Powered by GitHub API</p>
  </footer>

  <!-- ── PDF Modal ── -->
  <div id="modal" class="modal hidden" onclick="handleModalClick(event)">
    <div class="modal-box">
      <div class="modal-header">
        <h3 id="modal-title"></h3>
        <button class="btn-close" onclick="closeModal()" aria-label="閉じる">×</button>
      </div>
      <iframe id="pdf-viewer" title="PDF Viewer"></iframe>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
